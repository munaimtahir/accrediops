openapi: 3.1.0
info:
  title: AccrediOps API
  version: 1.0.0
  summary: Implemented contract for AccrediOps governance workflow API
  description: |
    This contract reflects currently implemented backend behavior, including envelope responses:
    - success responses: { success: true, data: ... }
    - error responses: { success: false, error: { code, message, details } }
servers:
  - url: http://127.0.0.1:18080
    description: Local Caddy reverse proxy
  - url: http://127.0.0.1:8000
    description: Direct Django service (local host runtime dependent)
tags:
  - name: System
  - name: Auth
  - name: Users
  - name: Admin
  - name: Frameworks
  - name: Projects
  - name: Worklist
  - name: Project Indicators
  - name: Evidence
  - name: Recurring
  - name: AI Advisory
  - name: Exports
paths:
  /api/health/:
    get:
      tags: [System]
      summary: Backend health check
      operationId: apiHealth
      responses:
        "200":
          description: Backend service and database health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBackendHealth"
  /api/auth/session/:
    get:
      tags: [Auth]
      summary: Get current authenticated session
      operationId: authSession
      responses:
        "200":
          description: Current auth session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAuthSession"
  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Log in using username and password
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAuthSession"
        "400":
          description: Invalid credentials or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/auth/logout/:
    post:
      tags: [Auth]
      summary: Log out current session
      operationId: authLogout
      responses:
        "200":
          description: Logout succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAuthSession"
  /api/users/:
    get:
      tags: [Users]
      summary: List active users
      operationId: usersList
      parameters:
        - $ref: "#/components/parameters/RoleQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: User summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserSummaryList"
  /api/client-profiles/:
    get:
      tags: [Users]
      summary: List client profiles
      operationId: clientProfilesList
      responses:
        "200":
          description: Client profile rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessClientProfileList"
    post:
      tags: [Users]
      summary: Create client profile
      operationId: clientProfilesCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileWrite"
      responses:
        "201":
          description: Client profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessClientProfile"
  /api/client-profiles/{id}/:
    get:
      tags: [Users]
      summary: Get client profile
      operationId: clientProfilesRetrieve
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Client profile detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessClientProfile"
    patch:
      tags: [Users]
      summary: Update client profile
      operationId: clientProfilesUpdate
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileWrite"
      responses:
        "200":
          description: Client profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessClientProfile"
  /api/client-profiles/{id}/variables-preview/:
    post:
      tags: [Users]
      summary: Preview variable replacement using client profile fields
      operationId: clientProfilesVariablesPreview
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariablesPreviewRequest"
      responses:
        "200":
          description: Replacement preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessVariablesPreview"
  /api/admin/dashboard/:
    get:
      tags: [Admin]
      summary: Get governance admin dashboard metrics
      operationId: adminDashboard
      responses:
        "200":
          description: Dashboard metrics and recent audit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAdminDashboard"
        "403":
          description: Requires ADMIN or LEAD
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/admin/masters/{key}/:
    get:
      tags: [Admin]
      summary: List master values by key
      operationId: adminMastersList
      parameters:
        - $ref: "#/components/parameters/KeyPath"
      responses:
        "200":
          description: Master values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMasterValueList"
    post:
      tags: [Admin]
      summary: Create master value by key
      operationId: adminMastersCreate
      parameters:
        - $ref: "#/components/parameters/KeyPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MasterValueWrite"
      responses:
        "201":
          description: Master value created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMasterValue"
  /api/admin/masters/{key}/{id}/:
    patch:
      tags: [Admin]
      summary: Update master value
      operationId: adminMastersUpdate
      parameters:
        - $ref: "#/components/parameters/KeyPath"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MasterValueWrite"
      responses:
        "200":
          description: Master value updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMasterValue"
  /api/admin/users/:
    get:
      tags: [Admin]
      summary: List admin-manageable users
      operationId: adminUsersList
      responses:
        "200":
          description: User rows with admin fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAdminUserList"
  /api/admin/users/{id}/:
    patch:
      tags: [Admin]
      summary: Update admin-managed user fields
      operationId: adminUsersUpdate
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserWrite"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAdminUser"
  /api/audit/:
    get:
      tags: [Admin]
      summary: Query audit log
      operationId: auditList
      parameters:
        - name: user
          in: query
          schema:
            type: integer
        - name: event_type
          in: query
          schema:
            type: string
        - name: object_type
          in: query
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Audit rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAuditEventAdminList"
  /api/admin/overrides/:
    get:
      tags: [Admin]
      summary: List MET reopen override audit events
      operationId: adminOverrides
      responses:
        "200":
          description: Override rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAuditEventAdminList"
  /api/admin/import/validate-framework/:
    post:
      tags: [Admin]
      summary: Validate framework import rows and log result
      operationId: adminImportValidateFramework
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrameworkImportValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFrameworkImportValidateResult"
  /api/admin/import/logs/:
    get:
      tags: [Admin]
      summary: List framework import logs
      operationId: adminImportLogs
      responses:
        "200":
          description: Import logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessImportLogList"
  /api/frameworks/:
    get:
      tags: [Frameworks]
      summary: List frameworks
      operationId: frameworksList
      responses:
        "200":
          description: Framework summary rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFrameworkSummaryList"
  /api/frameworks/{id}/analysis/:
    get:
      tags: [Frameworks]
      summary: Framework indicator analysis summary
      operationId: frameworksAnalysis
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Framework analysis counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFrameworkAnalysis"
  /api/projects/:
    get:
      tags: [Projects]
      summary: List accreditation projects
      operationId: projectsList
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          description: Paginated projects list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPaginatedProject"
    post:
      tags: [Projects]
      summary: Create accreditation project (ADMIN/LEAD)
      operationId: projectsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectWrite"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProject"
        "403":
          description: Requires ADMIN or LEAD
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/projects/{id}/:
    get:
      tags: [Projects]
      summary: Get project detail
      operationId: projectsRetrieve
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProject"
    patch:
      tags: [Projects]
      summary: Update project fields (ADMIN/LEAD)
      operationId: projectsUpdate
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectWrite"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProject"
  /api/projects/{id}/initialize-from-framework/:
    post:
      tags: [Projects]
      summary: Initialize project indicators and recurring requirements from framework
      operationId: projectsInitializeFromFramework
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitializeProjectRequest"
      responses:
        "200":
          description: Initialization counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessInitializeProjectResult"
  /api/projects/{id}/clone/:
    post:
      tags: [Projects]
      summary: Clone project scaffold without evidence/comments
      operationId: projectsClone
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneProjectRequest"
      responses:
        "201":
          description: Cloned project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProject"
  /api/projects/{id}/readiness/:
    get:
      tags: [Projects, Admin]
      summary: Project readiness summary with risk rows
      operationId: projectsReadiness
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Readiness summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectReadiness"
  /api/projects/{id}/inspection-view/:
    get:
      tags: [Projects]
      summary: Inspection-mode view (MET indicators only)
      operationId: projectsInspectionView
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Inspection sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessInspectionView"
  /api/projects/{id}/pre-inspection-check/:
    get:
      tags: [Projects]
      summary: Pre-inspection blockers summary
      operationId: projectsPreInspectionCheck
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Pre-inspection checklist payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPreInspectionCheck"
  /api/projects/{id}/standards-progress/:
    get:
      tags: [Projects]
      summary: Standards progress for project
      operationId: projectsStandardsProgress
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Standards progress rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessStandardsProgressList"
  /api/projects/{id}/areas-progress/:
    get:
      tags: [Projects]
      summary: Areas progress for project
      operationId: projectsAreasProgress
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Areas progress rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAreasProgressList"
  /api/dashboard/worklist/:
    get:
      tags: [Worklist]
      summary: Paginated governed indicator worklist
      operationId: dashboardWorklist
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
        - name: project_id
          in: query
          schema: { type: integer }
        - name: area_id
          in: query
          schema: { type: integer }
        - name: standard_id
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/IndicatorStatus" }
        - name: priority
          in: query
          schema: { $ref: "#/components/schemas/Priority" }
        - name: owner_id
          in: query
          schema: { type: integer }
        - name: reviewer_id
          in: query
          schema: { type: integer }
        - name: approver_id
          in: query
          schema: { type: integer }
        - name: recurring
          in: query
          schema: { type: boolean }
        - name: due_today
          in: query
          schema: { type: boolean }
        - name: overdue
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
        - name: evidence_approval_status
          in: query
          schema: { $ref: "#/components/schemas/EvidenceApprovalStatus" }
      responses:
        "200":
          description: Paginated worklist rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPaginatedDashboardRow"
  /api/project-indicators/{id}/:
    get:
      tags: [Project Indicators]
      summary: Get project indicator detail
      operationId: projectIndicatorsRetrieve
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Full project indicator detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicatorDetail"
  /api/project-indicators/{id}/assign/:
    post:
      tags: [Project Indicators]
      summary: Assign owner/reviewer/approver and priority/due date
      operationId: projectIndicatorsAssign
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignProjectIndicatorRequest"
      responses:
        "200":
          description: Updated project indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicator"
  /api/project-indicators/{id}/update-working-state/:
    post:
      tags: [Project Indicators]
      summary: Update working notes/priority/due date (no status mutation)
      operationId: projectIndicatorsUpdateWorkingState
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkingStateRequest"
      responses:
        "200":
          description: Updated project indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicator"
  /api/project-indicators/{id}/start/:
    post:
      tags: [Project Indicators]
      summary: "Workflow command: start"
      operationId: projectIndicatorsStart
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowReasonRequest"
      responses:
        "200":
          description: Updated project indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicator"
  /api/project-indicators/{id}/send-for-review/:
    post:
      tags: [Project Indicators]
      summary: "Workflow command: send-for-review"
      operationId: projectIndicatorsSendForReview
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowReasonRequest"
      responses:
        "200":
          description: Updated project indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicator"
  /api/project-indicators/{id}/mark-met/:
    post:
      tags: [Project Indicators]
      summary: "Workflow command: mark-met"
      operationId: projectIndicatorsMarkMet
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowReasonRequest"
      responses:
        "200":
          description: Updated project indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicator"
  /api/project-indicators/{id}/reopen/:
    post:
      tags: [Project Indicators]
      summary: "Workflow command: reopen (admin)"
      operationId: projectIndicatorsReopen
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReopenRequest"
      responses:
        "200":
          description: Updated project indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectIndicator"
  /api/project-indicators/{id}/evidence/:
    get:
      tags: [Evidence]
      summary: List evidence for project indicator
      operationId: projectIndicatorsEvidenceList
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Evidence list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEvidenceItemList"
  /api/evidence/:
    post:
      tags: [Evidence]
      summary: Create evidence item
      operationId: evidenceCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvidenceRequest"
      responses:
        "201":
          description: Evidence created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEvidenceItem"
  /api/evidence/{id}/update/:
    post:
      tags: [Evidence]
      summary: Update evidence item (versions if already reviewed)
      operationId: evidenceUpdate
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEvidenceRequest"
      responses:
        "200":
          description: Evidence updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEvidenceItem"
  /api/evidence/{id}/review/:
    post:
      tags: [Evidence]
      summary: Review evidence item
      operationId: evidenceReview
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceReviewRequest"
      responses:
        "200":
          description: Evidence reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEvidenceItem"
  /api/recurring/queue/:
    get:
      tags: [Recurring]
      summary: List recurring queue items
      operationId: recurringQueue
      parameters:
        - name: project_id
          in: query
          schema: { type: integer }
        - name: frequency
          in: query
          schema: { $ref: "#/components/schemas/RecurrenceFrequency" }
        - name: owner_id
          in: query
          schema: { type: integer }
        - name: due_today
          in: query
          schema: { type: boolean }
        - name: overdue
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Recurring queue rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessRecurringInstanceList"
  /api/recurring/instances/{id}/submit/:
    post:
      tags: [Recurring]
      summary: Submit recurring instance
      operationId: recurringSubmit
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRecurringRequest"
      responses:
        "200":
          description: Recurring instance updated to SUBMITTED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessRecurringInstance"
  /api/recurring/instances/{id}/approve/:
    post:
      tags: [Recurring]
      summary: Approve or reject recurring instance
      operationId: recurringApprove
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRecurringRequest"
      responses:
        "200":
          description: Recurring instance reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessRecurringInstance"
  /api/project-indicators/{id}/ai-outputs/:
    get:
      tags: [AI Advisory]
      summary: List AI outputs for project indicator
      operationId: aiOutputsList
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: AI outputs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAIOutputList"
  /api/ai/generate/:
    post:
      tags: [AI Advisory]
      summary: Generate advisory output
      operationId: aiGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAIRequest"
      responses:
        "201":
          description: AI output generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAIOutput"
  /api/ai/outputs/{id}/accept/:
    post:
      tags: [AI Advisory]
      summary: Accept AI output (advisory acceptance only)
      operationId: aiAccept
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: AI output accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAIOutput"
  /api/exports/projects/{id}/excel/:
    get:
      tags: [Exports]
      summary: Generate structured excel export payload
      operationId: exportsProjectExcel
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Export payload with bundle/warnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectExcelExport"
  /api/exports/projects/{id}/print-bundle/:
    get:
      tags: [Exports]
      summary: Generate structured print bundle payload
      operationId: exportsProjectPrintBundle
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Print bundle sections with warnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectPrintBundleExport"
  /api/exports/projects/{id}/physical-retrieval/:
    get:
      tags: [Exports]
      summary: Generate physical evidence retrieval list
      operationId: exportsProjectPhysicalRetrieval
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Physical evidence retrieval items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessProjectPhysicalRetrievalExport"
  /api/exports/projects/{id}/history/:
    get:
      tags: [Exports, Admin]
      summary: List project export jobs
      operationId: exportsProjectHistory
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Export job rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessExportJobList"
  /api/exports/projects/{id}/generate/:
    post:
      tags: [Exports, Admin]
      summary: Create export job record
      operationId: exportsProjectGenerate
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateExportRequest"
      responses:
        "201":
          description: Export job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessExportJob"
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    KeyPath:
      name: key
      in: path
      required: true
      schema:
        type: string
    RoleQuery:
      name: role
      in: query
      schema:
        $ref: "#/components/schemas/UserRole"
    SearchQuery:
      name: search
      in: query
      schema:
        type: string
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PageSizeQuery:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details: {}
          required: [code, message, details]
      required: [success, error]
    UserRole:
      type: string
      enum: [ADMIN, LEAD, OWNER, REVIEWER, APPROVER]
    ProjectStatus:
      type: string
      enum: [DRAFT, ACTIVE, COMPLETED, ARCHIVED]
    IndicatorStatus:
      type: string
      enum: [NOT_STARTED, IN_PROGRESS, UNDER_REVIEW, MET, BLOCKED]
    Priority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]
    RecurrenceFrequency:
      type: string
      enum: [NONE, DAILY, WEEKLY, MONTHLY, YEARLY]
    RecurrenceMode:
      type: string
      enum: [DIGITAL, UPLOAD, EITHER]
    EvidenceSourceType:
      type: string
      enum: [UPLOAD, URL, TEXT_NOTE, GENERATED, EXTERNAL_REF]
    EvidenceValidityStatus:
      type: string
      enum: [UNKNOWN, VALID, INVALID]
    EvidenceCompletenessStatus:
      type: string
      enum: [UNKNOWN, COMPLETE, INCOMPLETE]
    EvidenceApprovalStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    RecurringInstanceStatus:
      type: string
      enum: [PENDING, SUBMITTED, APPROVED, MISSED]
    AIOutputType:
      type: string
      enum: [GUIDANCE, DRAFT, ASSESSMENT]
    EvidenceReusePolicy:
      type: string
      enum: [NONE, MANUAL_REVIEW, AUTO_ALLOWED]
    PhysicalLocationType:
      type: string
      enum: [BINDER, CABINET, ROOM, OTHER]
    UserSummary:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
      required: [id, username, first_name, last_name, role]
    FrameworkSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
      required: [id, name, description]
    FrameworkAnalysis:
      type: object
      properties:
        framework_id: { type: integer }
        framework_name: { type: string }
        total_indicators: { type: integer }
        recurring_indicators: { type: integer }
        one_time_indicators: { type: integer }
        physical_evidence_indicators: { type: integer }
        register_log_indicators: { type: integer }
        document_indicators: { type: integer }
        meeting_minutes_indicators: { type: integer }
      required:
        - framework_id
        - framework_name
        - total_indicators
        - recurring_indicators
        - one_time_indicators
        - physical_evidence_indicators
        - register_log_indicators
        - document_indicators
        - meeting_minutes_indicators
    ClientProfile:
      type: object
      properties:
        id: { type: integer }
        organization_name: { type: string }
        address: { type: string }
        license_number: { type: string }
        registration_number: { type: string }
        contact_person: { type: string }
        department_names:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        - id
        - organization_name
        - address
        - license_number
        - registration_number
        - contact_person
        - department_names
        - created_at
        - updated_at
    ClientProfileWrite:
      type: object
      properties:
        organization_name: { type: string }
        address: { type: string }
        license_number: { type: string }
        registration_number: { type: string }
        contact_person: { type: string }
        department_names:
          type: array
          items: { type: string }
    VariablesPreviewRequest:
      type: object
      properties:
        text: { type: string }
      required: [text]
    VariablesPreviewResponse:
      type: object
      properties:
        text: { type: string }
        replaced_text: { type: string }
      required: [text, replaced_text]
    Project:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        client_name: { type: string }
        accrediting_body_name: { type: string }
        framework: { type: integer }
        client_profile:
          type: integer
          nullable: true
        status: { $ref: "#/components/schemas/ProjectStatus" }
        start_date: { type: string, format: date }
        target_date: { type: string, format: date }
        notes: { type: string }
        created_by:
          type: integer
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        total_indicators: { type: integer }
        met_indicators: { type: integer }
        pending_indicators: { type: integer }
        recurring_due_today: { type: integer }
        overdue_recurring_items: { type: integer }
      required:
        - id
        - name
        - client_name
        - accrediting_body_name
        - framework
        - client_profile
        - status
        - start_date
        - target_date
        - notes
        - created_by
        - created_at
        - updated_at
        - total_indicators
        - met_indicators
        - pending_indicators
        - recurring_due_today
        - overdue_recurring_items
    ProjectWrite:
      type: object
      properties:
