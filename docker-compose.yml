services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accrediops-backend
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.accrediops_backend.settings
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,caddy,frontend,backend,phc.alshifalab.pk,api.phc.alshifalab.pk"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:18080,http://127.0.0.1:18080,https://phc.alshifalab.pk,https://api.phc.alshifalab.pk"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
      DJANGO_SESSION_COOKIE_SAMESITE: "Lax"
      DJANGO_CSRF_COOKIE_SAMESITE: "Lax"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: db.sqlite3
    volumes:
      - ./backend:/app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accrediops-frontend
    working_dir: /app
    command: sh -c "npm install --include=dev && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      BACKEND_API_URL: "http://backend:8000"
      NODE_ENV: production
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 90s

  caddy:
    image: caddy:2.8
    container_name: accrediops-caddy
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "18080:8080"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  frontend_node_modules:
  frontend_next_cache:
  caddy_data:
  caddy_config:
